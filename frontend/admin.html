<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel - GoFood</title>
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .admin-nav {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      border-bottom: 2px solid var(--border-color);
      padding-bottom: 10px;
    }
    .admin-nav button {
      padding: 8px 15px;
      background: white;
      border: 1px solid var(--border-color);
      cursor: pointer;
      border-radius: 5px;
    }
    .admin-nav button.active {
      background: var(--primary-color);
      color: white;
    }
    .section {
      display: none;
    }
    .section.active {
      display: block;
    }
    .form-section {
      background: white;
      padding: 20px;
      border-radius: 8px;
      margin-bottom: 20px;
      border: 1px solid var(--border-color);
    }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    table th, table td {
      padding: 12px;
      text-align: left;
      border-bottom: 1px solid var(--border-color);
    }
    table th {
      background: var(--light-bg);
      font-weight: 600;
    }
    .action-buttons {
      display: flex;
      gap: 10px;
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="container">
      <div class="nav-brand">GoFood Admin</div>
      <ul class="nav-menu">
        <li><a href="index.html" class="nav-link">Home</a></li>
        <li><a href="#" class="nav-link" id="logout-link">Logout</a></li>
      </ul>
    </div>
  </nav>

  <div class="container" style="margin-top: 30px;">
    <h1>Admin Dashboard</h1>

    <div class="admin-nav">
      <button class="active" onclick="showSection('restaurants')">Restaurants</button>
      <button onclick="showSection('items')">Items</button>
      <button onclick="showSection('orders')">Orders</button>
      <button onclick="showSection('users')">Users</button>
    </div>

    <!-- Restaurants Section -->
    <div id="restaurants" class="section active">
      <div class="form-section">
        <h2>Add Restaurant</h2>
        <form id="restaurant-form">
          <div class="form-group">
            <label for="rest-name">Name</label>
            <input type="text" id="rest-name" required>
          </div>
          <div class="form-group">
            <label for="rest-address">Address</label>
            <input type="text" id="rest-address" required>
          </div>
          <div class="form-group">
            <label for="rest-phone">Phone</label>
            <input type="tel" id="rest-phone">
          </div>
          <div class="form-group">
            <label for="rest-desc">Description</label>
            <textarea id="rest-desc"></textarea>
          </div>
          <button type="submit" class="btn btn-primary">Add Restaurant</button>
        </form>
      </div>

      <h2>Restaurants List</h2>
      <div id="restaurants-list"></div>
    </div>

    <!-- Items Section -->
    <div id="items" class="section">
      <div class="form-section">
        <h2>Add Item</h2>
        <form id="item-form">
          <div class="form-group">
            <label for="item-rest">Restaurant</label>
            <select id="item-rest" required></select>
          </div>
          <div class="form-group">
            <label for="item-name">Name</label>
            <input type="text" id="item-name" required>
          </div>
          <div class="form-group">
            <label for="item-desc">Description</label>
            <textarea id="item-desc"></textarea>
          </div>
          <div class="form-group">
            <label for="item-price">Price</label>
            <input type="number" id="item-price" step="0.01" required>
          </div>
          <div class="form-group">
            <label for="item-category">Category</label>
            <input type="text" id="item-category">
          </div>
          <button type="submit" class="btn btn-primary">Add Item</button>
        </form>
      </div>

      <h2>Items List</h2>
      <div id="items-list"></div>
    </div>

    <!-- Orders Section -->
    <div id="orders" class="section">
      <h2>All Orders</h2>
      <div id="orders-list"></div>
    </div>

    <!-- Users Section -->
    <div id="users" class="section">
      <h2>All Users</h2>
      <div id="users-list"></div>
    </div>
  </div>

  <footer class="footer">
    <div class="container">
      <p>&copy; 2025 GoFood Admin Panel. All rights reserved.</p>
    </div>
  </footer>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
