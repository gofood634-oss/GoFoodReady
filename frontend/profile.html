<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile - GoFood</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <nav class="navbar">
    <div class="container">
      <div class="nav-brand">GoFood</div>
      <ul class="nav-menu">
        <li><a href="index.html" class="nav-link">Home</a></li>
        <li><a href="index.html#restaurants" class="nav-link">Restaurants</a></li>
        <li><a href="cart.html" class="nav-link">Cart</a></li>
        <li id="auth-links">
          <a href="login.html" class="nav-link">Login</a>
          <a href="register.html" class="nav-link">Register</a>
        </li>
        <li id="user-links" style="display: none;">
          <a href="profile.html" class="nav-link active">Profile</a>
          <a href="#" class="nav-link" id="logout-link">Logout</a>
        </li>
      </ul>
    </div>
  </nav>

  <div class="container">
    <h1>My Profile</h1>
    
    <div class="profile-content">
      <div class="profile-form">
        <h2>Profile Information</h2>
        <form id="profile-form">
          <div class="form-group">
            <label for="name">Full Name</label>
            <input type="text" id="name" name="name" required>
          </div>

          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" disabled>
          </div>

          <div class="form-group">
            <label for="phone">Phone</label>
            <input type="tel" id="phone" name="phone">
          </div>

          <div class="form-group">
            <label for="address">Address</label>
            <textarea id="address" name="address"></textarea>
          </div>

          <button type="submit" class="btn btn-primary">Update Profile</button>
        </form>
      </div>

      <div class="profile-orders">
        <h2>Order History</h2>
        <div id="orders-list">
          <!-- Orders will be loaded here -->
        </div>
      </div>
    </div>
  </div>

  <footer class="footer">
    <div class="container">
      <p>&copy; 2025 GoFood. All rights reserved.</p>
    </div>
  </footer>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/profile.js"></script>
</body>
</html>
