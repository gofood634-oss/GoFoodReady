<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cart - Go Food</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    :root{--primary:#ff6b35;--muted:#f5f5f5;--dark:#222}
    *{box-sizing:border-box}
    body{font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,'Helvetica Neue',Arial; margin:0;color:var(--dark);background:#fff}
    header{background:linear-gradient(90deg,#fff 0%, #fff 60%, #fff0 100%);padding:18px 24px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #eee}
    .brand{display:flex;gap:12px;align-items:center}
    .logo{width:48px;height:48px;border-radius:10px;background:var(--primary);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700}
    nav a{margin-left:16px;text-decoration:none;color:#333;font-weight:600}
    .page-header{padding:24px;border-bottom:1px solid #eee}
    .page-header h1{margin:0 0 8px;font-size:32px}
    .page-header p{margin:0;color:#555}
    .cart-container{max-width:1000px;margin:40px auto;padding:0 24px;display:grid;grid-template-columns:1fr 320px;gap:24px}
    .cart-items-section h2{font-size:24px;margin:0 0 20px;color:var(--dark)}
    .cart-item{display:flex;gap:16px;padding:16px;border:1px solid #eee;border-radius:8px;margin-bottom:12px;background:#fff}
    .item-image{width:100px;height:100px;border-radius:8px;object-fit:cover}
    .item-details{flex:1;display:flex;flex-direction:column;justify-content:space-between}
    .item-title{font-weight:700;color:var(--dark)}
    .item-price{font-size:14px;color:#666;margin:4px 0}
    .item-controls{display:flex;gap:8px;align-items:center}
    .qty-btn{padding:6px 8px;border:1px solid #ddd;background:#fff;border-radius:4px;cursor:pointer;font-weight:600}
    .qty-display{min-width:40px;text-align:center;font-weight:600}
    .remove-btn{padding:6px 12px;background:#fee;color:#d32f2f;border:1px solid #ffcdd2;border-radius:4px;cursor:pointer;font-size:12px;font-weight:600}
    .cart-summary{border:1px solid #eee;border-radius:8px;padding:20px;background:#fafafa;height:fit-content}
    .cart-summary h3{margin:0 0 16px;font-size:18px;color:var(--dark)}
    .summary-row{display:flex;justify-content:space-between;margin-bottom:12px;font-size:14px;color:#555}
    .summary-row.total{font-weight:700;color:var(--dark);font-size:18px;padding-top:12px;border-top:1px solid #ddd}
    .checkout-btn{width:100%;padding:12px;background:var(--primary);color:#fff;border:none;border-radius:8px;cursor:pointer;font-weight:600;margin-top:16px;font-size:16px}
    .checkout-btn:hover{background:#e55a2b}
    .empty-cart{text-align:center;padding:40px 24px;color:#999}
    .empty-cart h2{margin:0 0 8px}
    .empty-btn{display:inline-block;padding:12px 24px;background:var(--primary);color:#fff;text-decoration:none;border-radius:8px;margin-top:16px;font-weight:600}
    footer{padding:18px 24px;text-align:center;color:#777;border-top:1px solid #eee;margin-top:40px}
    @media (max-width:900px){.cart-container{grid-template-columns:1fr;padding:0 16px}}
  </style>
</head>
<body>
  <header>
    <a href="index.html" style="text-decoration:none;display:flex;gap:12px;align-items:center">
      <div class="brand">
        <div class="logo">GF</div>
        <div>
          <div style="font-weight:700">Go Food</div>
          <div style="font-size:12px;color:#666">Destination for foodies</div>
        </div>
      </div>
    </a>
    <nav>
      <a href="index.html">Home</a>
      <a href="restaurants.html">Restaurants</a>
      <a href="cart.html">Cart (<span id="cart-count">0</span>)</a>
    </nav>
  </header>

  <main>
    <div class="page-header">
      <h1>Your Cart</h1>
      <p>Review your items and proceed to checkout</p>
    </div>

    <div class="cart-container">
      <div class="cart-items-section">
        <h2>Items</h2>
        <div id="cart-items">
          <div style="color:#888">Cart is empty</div>
        </div>
      </div>
      
      <div class="cart-summary">
        <h3>Order Summary</h3>
        <div class="summary-row">
          <span>Subtotal:</span>
          <span>₹<span id="subtotal">0.00</span></span>
        </div>
        <div class="summary-row">
          <span>Delivery:</span>
          <span>₹<span id="delivery">50.00</span></span>
        </div>
        <div class="summary-row total">
          <span>Total:</span>
          <span>₹<span id="total">50.00</span></span>
        </div>
        <button class="checkout-btn" id="checkout-btn" onclick="window.location.href='checkout.html'">Proceed to Checkout</button>
      </div>
    </div>
  </main>

  <footer>
    © Go Food — Built as a project.
  </footer>

  <script>
    const cartItemsDiv = document.getElementById('cart-items');
    const subtotalEl = document.getElementById('subtotal');
    const totalEl = document.getElementById('total');
    const cartCountEl = document.getElementById('cart-count');
    const deliveryFee = 50;

    let cart = JSON.parse(localStorage.getItem('gofood_cart')||'{}');

    function renderCart(){
      const keys = Object.keys(cart);
      cartCountEl.textContent = keys.reduce((s,k)=>s+cart[k].qty,0);
      
      if(keys.length===0){
        cartItemsDiv.innerHTML = '<div style="color:#888;text-align:center;padding:40px">Cart is empty</div>';
        subtotalEl.textContent = '0.00';
        totalEl.textContent = deliveryFee.toFixed(2);
        return;
      }

      cartItemsDiv.innerHTML = '';
      let subtotal = 0;

      keys.forEach(k=>{
        const item = cart[k];
        subtotal += item.price * item.qty;
        
        const itemDiv = document.createElement('div');
        itemDiv.className = 'cart-item';
        itemDiv.innerHTML = `
          <div style="width:100px;height:100px;background:#f0f0f0;border-radius:8px"></div>
          <div class="item-details">
            <div>
              <div class="item-title">${item.title}</div>
              <div class="item-price">₹${item.price} × ${item.qty} = ₹${(item.price * item.qty).toFixed(2)}</div>
            </div>
            <div class="item-controls">
              <button class="qty-btn" data-act="dec" data-id="${item.id}">−</button>
              <div class="qty-display">${item.qty}</div>
              <button class="qty-btn" data-act="inc" data-id="${item.id}">+</button>
              <button class="remove-btn" data-id="${item.id}">Remove</button>
            </div>
          </div>
        `;
        cartItemsDiv.appendChild(itemDiv);
      });

      subtotalEl.textContent = subtotal.toFixed(2);
      totalEl.textContent = (subtotal + deliveryFee).toFixed(2);

      document.querySelectorAll('.qty-btn').forEach(btn=>{
        btn.addEventListener('click',()=>{
          const id = Number(btn.dataset.id);
          const act = btn.dataset.act;
          if(act==='inc') cart[id].qty += 1;
          else { cart[id].qty -= 1; if(cart[id].qty<=0) delete cart[id]; }
          saveCart();
          renderCart();
        });
      });

      document.querySelectorAll('.remove-btn').forEach(btn=>{
        btn.addEventListener('click',()=>{
          const id = Number(btn.dataset.id);
          delete cart[id];
          saveCart();
          renderCart();
        });
      });
    }

    function saveCart(){
      localStorage.setItem('gofood_cart', JSON.stringify(cart));
    }



    renderCart();
  </script>
</body>
</html>
